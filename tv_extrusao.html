<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",sans-serif;background:#060e06;color:#e8f0e8;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{background:#011a0a;border-bottom:2px solid #024f2b;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.top-left{display:flex;align-items:center;gap:14px}
.top-sub{color:#739630;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.top-right{display:flex;align-items:center;gap:20px}
.top-hora{font-size:26px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:2px}
.top-turno{background:#024f2b;color:#fff;padding:5px 16px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:1px}
.top-data{color:#739630;font-size:12px}
.dot{width:10px;height:10px;border-radius:50%;background:#2ea043;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* GRID 4 VELOCÍMETROS */
.grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;padding:10px 14px 6px;flex:1;min-height:0}

/* CARD */
.card{background:#0d1a0d;border:2px solid #1a3a1a;border-radius:16px;padding:14px 10px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:.5s;position:relative;overflow:hidden}
.card.ok{border-color:#024f2b;box-shadow:0 0 20px rgba(2,79,43,.3)}
.card.warn{border-color:#d29922;box-shadow:0 0 20px rgba(210,153,34,.2)}
.card.bad{border-color:#c0392b;box-shadow:0 0 20px rgba(192,57,43,.2)}
.card.parado{border-color:#c0392b;background:#120808;animation:flicker 1.5s infinite}
@keyframes flicker{0%,100%{box-shadow:0 0 20px rgba(192,57,43,.3)}50%{box-shadow:0 0 40px rgba(192,57,43,.6)}}

/* NOME LINHA */
.card-linha{font-size:15px;font-weight:800;color:#739630;letter-spacing:2px;text-transform:uppercase}

/* VELOCÍMETRO SVG */
.velocimetro-wrap{position:relative;width:100%;display:flex;justify-content:center}
.velocimetro-wrap svg{width:100%;max-width:240px;height:auto}

/* OP INFO */
.op-info{text-align:center;width:100%}
.op-num{font-size:10px;font-weight:700;color:#739630;letter-spacing:1px}
.op-desc{font-size:11px;color:#aaa;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}

/* MÉTRICAS EMBAIXO */
.mets{display:flex;gap:8px;width:100%}
.met{flex:1;background:#111f11;border-radius:8px;padding:8px 6px;text-align:center}
.met-v{font-size:18px;font-weight:800;line-height:1}
.met-l{font-size:9px;color:#739630;font-weight:700;text-transform:uppercase;margin-top:2px;letter-spacing:.5px}
.c-ok{color:#2ea043}
.c-warn{color:#f39c12}
.c-bad{color:#e74c3c}
.c-neu{color:#e8f0e8}

/* STATUS PARADA */
.parada-label{background:#c0392b;color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:1px}

/* BARRA TOTAIS */
.totais-bar{background:#011a0a;border-top:1px solid #1a3a1a;border-bottom:1px solid #1a3a1a;padding:6px 24px;display:flex;align-items:center;gap:0;flex-shrink:0}
.tot-item{flex:1;display:flex;align-items:center;justify-content:center;gap:12px}
.tot-sep{width:1px;background:#1a3a1a;height:24px;flex-shrink:0}
.tot-lbl{font-size:10px;font-weight:700;color:#4a664a;text-transform:uppercase;letter-spacing:1px}
.tot-val{font-size:22px;font-weight:800;color:#739630;font-variant-numeric:tabular-nums}

/* RODAPÉ ROLANTE */
.rodape{background:#011a0a;border-top:2px solid #024f2b;height:42px;display:flex;align-items:center;overflow:hidden;flex-shrink:0;position:relative}
.rod-titulo{background:#024f2b;color:#fff;font-size:11px;font-weight:700;padding:0 16px;height:100%;display:flex;align-items:center;white-space:nowrap;letter-spacing:1px;flex-shrink:0}
.rod-scroll{display:flex;align-items:center;white-space:nowrap;animation:scroll-left 40s linear infinite;gap:0}
.rod-item{display:inline-flex;align-items:center;gap:8px;padding:0 24px;border-right:1px solid #1a3a1a;font-size:12px}
.rod-linha{color:#739630;font-weight:700}
.rod-hora{color:#aaa}
.rod-motivo{color:#ffaaaa}
.rod-dur{color:#e74c3c;font-weight:700}
.rod-sep{color:#1a3a1a;font-size:18px}
@keyframes scroll-left{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.rod-total{margin-left:auto;padding:0 20px;font-size:13px;font-weight:700;color:#739630;white-space:nowrap;flex-shrink:0;border-left:1px solid #1a3a1a}
</style>
</head>

var NOMES={"Linha 1 (E-240)":"LINHA 1","Linha 2 (E-200)":"LINHA 2","Linha 4 (Andritz I)":"LINHA 4","Linha 5 (Andritz II)":"LINHA 5"};
var EST={};
LINHAS.forEach(function(l){EST[l]={ops:[],apts:[],paradas:[],opAtiva:null};});
var OPS=[];
var TOT_MES=0;
var TOT_DIA=0;

function G(id){return document.getElementById(id);}
function hoje(){return new Date().toISOString().slice(0,10);}
function pad(n){return String(n).padStart(2,"0");}
function fN(n){return (Number(n)||0).toLocaleString("pt-BR");}
function turnoAtual(){var h=new Date().getHours();return h>=21||h<5?1:h<13?2:3;}
function getMetaH(cod,linha){var m=METAS_IDX[cod];if(!m)return 0;return m[LINHA_META[linha]]||0;}
function minH(min){return pad(Math.floor(min/60))+":"+pad(min%60);}

// ── VELOCÍMETRO SVG ───────────────────────────────────────
function drawVelocimetro(pct, cor){
  // Semi-círculo: ângulo de -180° a 0° (da esquerda para direita)
  // pct 0-100 → ângulo -180° a 0°
  var W=220, H=130, cx=W/2, cy=H-10;
  var R=95, rInt=58;
  var p=Math.min(Math.max(pct,0),100);

  // Cor baseada no valor
  var corFill=p>=85?"#2ea043":p>=70?"#f39c12":"#e74c3c";
  var corGlow=p>=85?"rgba(46,160,67,.4)":p>=70?"rgba(243,156,18,.4)":"rgba(231,76,60,.4)";

  // Faixas do fundo (arco cinza)
  function polarToXY(deg, r){
    var rad=(deg-180)*Math.PI/180;
    return {x: cx + r*Math.cos(rad), y: cy + r*Math.sin(rad)};
  }
  function arcPath(startDeg, endDeg, r1, r2){
    var s1=polarToXY(startDeg,r1), e1=polarToXY(endDeg,r1);
    var s2=polarToXY(startDeg,r2), e2=polarToXY(endDeg,r2);
    var la=endDeg-startDeg>180?1:0;
    return "M"+s1.x+","+s1.y+" A"+r1+","+r1+" 0 "+la+",1 "+e1.x+","+e1.y+
           " L"+e2.x+","+e2.y+" A"+r2+","+r2+" 0 "+la+",0 "+s2.x+","+s2.y+" Z";
  }

  // Ângulo da agulha: 0% = -180deg (esquerda), 100% = 0deg (direita)
  var agulhaDeg = p * 1.8; // 0-180 graus
  var agulhaRad = (agulhaDeg - 180) * Math.PI / 180;
  var ax = cx + (R-8) * Math.cos(agulhaRad);
  var ay = cy + (R-8) * Math.sin(agulhaRad);
  var ax2 = cx - 10 * Math.cos(agulhaRad);
  var ay2 = cy - 10 * Math.sin(agulhaRad);

  // Faixas coloridas de fundo
  var svg = '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';

  // Arco fundo cinza escuro
  svg += '<path d="'+arcPath(0,180,R,rInt)+'" fill="#1a2e1a" />';

  // Faixas: vermelho 0-70, amarelo 70-90, verde 90-100
  svg += '<path d="'+arcPath(0,126,R,rInt)+'" fill="rgba(192,57,43,.25)" />';   // 0-70%
  svg += '<path d="'+arcPath(126,153,R,rInt)+'" fill="rgba(210,153,34,.25)" />'; // 70-85%
  svg += '<path d="'+arcPath(153,180,R,rInt)+'" fill="rgba(2,79,43,.35)" />';    // 85-100%

  // Arco preenchido até o valor atual
  if(p>0){
    var endDeg=p*1.8;
    svg += '<path d="'+arcPath(0,endDeg,R,rInt)+'" fill="'+corFill+'" opacity="0.9"/>';
  }

  // Marcações de escala
  [0,25,50,75,100].forEach(function(v){
    var deg=v*1.8;
    var rad=(deg-180)*Math.PI/180;
    var x1=cx+(R+4)*Math.cos(rad), y1=cy+(R+4)*Math.sin(rad);
    var x2=cx+(R+14)*Math.cos(rad), y2=cy+(R+14)*Math.sin(rad);
    var xt=cx+(R+24)*Math.cos(rad), yt=cy+(R+24)*Math.sin(rad);
    svg += '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="#4a664a" stroke-width="1.5"/>';
    svg += '<text x="'+xt+'" y="'+(yt+4)+'" fill="#4a664a" font-size="9" text-anchor="middle">'+v+'%</text>';
  });

  // Agulha
  svg += '<line x1="'+ax2+'" y1="'+ay2+'" x2="'+ax+'" y2="'+ay+'" stroke="'+corFill+'" stroke-width="3" stroke-linecap="round"/>';
  // Centro
  svg += '<circle cx="'+cx+'" cy="'+cy+'" r="8" fill="'+corFill+'"/>';
  svg += '<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="#0d1a0d"/>';

  // % no centro do arco
  svg += '<text x="'+cx+'" y="'+(cy-22)+'" fill="'+corFill+'" font-size="28" font-weight="800" text-anchor="middle" font-family="Segoe UI,Arial">'+p+'%</text>';

  svg += '</svg>';
  return svg;
}

// ── RENDER ────────────────────────────────────────────────
function renderTudo(){
  var tot=0;
  LINHAS.forEach(function(l){
    tot+=(EST[l].apts||[]).reduce(function(a,x){return a+(Number(x.real)||0);},0);
    renderLinha(l);
  });
  G("rod-total").textContent="Total Turno: "+fN(tot)+" kg";
  atualizarTotais();
  renderRodape();
}

function renderLinha(linha){
  var grid=G("grid"); if(!grid) return;
  var id="tv-"+linha.replace(/[^a-zA-Z0-9]/g,"_");
  var card=document.getElementById(id);
  if(!card){card=document.createElement("div");card.id=id;grid.appendChild(card);}

  var e=EST[linha];
  var opAtiva=e.opAtiva?OPS.find(function(o){return o.fbKey===e.opAtiva;})||null:null;
  var metaH=opAtiva?getMetaH(opAtiva.cod,linha):0;
  var totalTurno=e.apts.reduce(function(a,x){return a+(Number(x.real)||0);},0);
  var paradaAberta=e.paradas.find(function(p){return !p.horaFim;})||null;
  var nApts=e.apts.length;
  var metaAcum=metaH*nApts;
  var pct=metaAcum>0?Math.round(totalTurno/metaAcum*100):0;
  var nomeL=NOMES[linha]||linha;

  // Cor status
  var cardCls=paradaAberta?"card parado":pct>=85?"card ok":pct>=70?"card warn":"card bad";
  var corVal=pct>=85?"c-ok":pct>=70?"c-warn":"c-bad";

  // Tempo de parada total
  var minParaTotal=0;
  e.paradas.forEach(function(p){
    if(p.horaIni&&p.horaFim){
      var a=p.horaIni.split(":"),b=p.horaFim.split(":");
      minParaTotal+=(parseInt(b[0])*60+parseInt(b[1]))-(parseInt(a[0])*60+parseInt(a[1]));
    }
  });

  var h="";
  h+='<div class="card-linha">'+nomeL+'</div>';

  if(paradaAberta){
    // Duração da parada atual
    var durMin=0;
    if(paradaAberta.horaIni){
      var d=new Date();
      var hNow=d.getHours()*60+d.getMinutes();
      var ini=paradaAberta.horaIni.split(":");
      durMin=Math.max(hNow-(parseInt(ini[0])*60+parseInt(ini[1])),0);
    }
    h+='<div class="parada-label">⏸ EM PARADA — '+minH(durMin)+'</div>';
  }

  // Velocímetro
  h+='<div class="velocimetro-wrap">'+drawVelocimetro(Math.min(pct,100), corVal)+'</div>';

  // OP atual
  if(opAtiva){
    h+='<div class="op-info">';
    h+='<div class="op-num">OP: '+opAtiva.id+'</div>';
    h+='<div class="op-desc">'+(opAtiva.desc||opAtiva.cod)+'</div>';
    h+='</div>';
  } else {
    h+='<div class="op-info"><div class="op-desc" style="color:#555">Sem OP ativa</div></div>';
  }

  // Métricas
  h+='<div class="mets">';
  h+='<div class="met"><div class="met-v '+corVal+'">'+fN(totalTurno)+'</div><div class="met-l">kg prod.</div></div>';
  h+='<div class="met"><div class="met-v c-neu">'+fN(metaAcum)+'</div><div class="met-l">kg meta</div></div>';
  h+='<div class="met"><div class="met-v c-bad">'+minH(minParaTotal)+'</div><div class="met-l">paradas</div></div>';
  h+='</div>';

  // Motivo da parada ativa
  if(paradaAberta){
    h+='<div style="background:#1a0808;border:1px solid #c0392b;border-radius:8px;padding:6px 10px;width:100%;text-align:center">';
    h+='<div style="font-size:11px;color:#ffaaaa;font-weight:600">'+paradaAberta.descricao+'</div>';
    h+='</div>';
  }

  card.className=cardCls;
  card.innerHTML=h;
}

function renderRodape(){
  var todasParadas=[];
  LINHAS.forEach(function(linha){
    var nomeL=NOMES[linha]||linha;
    (EST[linha].paradas||[]).forEach(function(p){
      if(p.horaIni){
        var min=0;
        if(p.horaFim){
          var a=p.horaIni.split(":"),b=p.horaFim.split(":");
          min=(parseInt(b[0])*60+parseInt(b[1]))-(parseInt(a[0])*60+parseInt(a[1]));
        }
        todasParadas.push({linha:nomeL,horaIni:p.horaIni,horaFim:p.horaFim||"...",desc:p.descricao,min:min});
      }
    });
  });

  if(!todasParadas.length){
    G("rod-scroll").innerHTML='<span class="rod-item"><span style="color:#4a664a">Nenhuma parada registrada neste turno</span></span>';
    return;
  }

  // Duplica para loop contínuo
  var h="";
  [0,1].forEach(function(){
    todasParadas.forEach(function(p){
      h+='<span class="rod-item">';
      h+='<span class="rod-linha">'+p.linha+'</span>';
      h+='<span class="rod-hora">'+p.horaIni+' → '+p.horaFim+'</span>';
      h+='<span class="rod-sep">·</span>';
      h+='<span class="rod-motivo">'+p.desc+'</span>';
      if(p.min>0) h+='<span class="rod-dur">'+minH(p.min)+'</span>';
      h+='</span>';
    });
  });
  G("rod-scroll").innerHTML=h;

  // Ajusta velocidade da animação pelo número de itens
  var duracao=Math.max(todasParadas.length*6, 20);
  G("rod-scroll").style.animationDuration=duracao+"s";
}

// ── FIREBASE ─────────────────────────────────────────────
function iniciar(){
  iniciarRelogio();
  if(!DB){renderTudo();return;}
  var dt=hoje(), t=turnoAtual();

  DB.ref("ops").orderByChild("data").equalTo(dt).on("value",function(s){
    OPS=[];
    if(s.exists()) s.forEach(function(c){var v=c.val();v.fbKey=c.key;OPS.push(v);});
    LINHAS.forEach(function(l){EST[l].ops=OPS.filter(function(o){return o.linha===l;});});
    renderTudo();
  });

  DB.ref("extrusao_apts").orderByChild("data").equalTo(dt).on("value",function(s){
    LINHAS.forEach(function(l){EST[l].apts=[];});
    if(s.exists()) s.forEach(function(c){
      var a=c.val(); a.fbKey=c.key;
      if(a.turno===t && EST[a.linha]) EST[a.linha].apts.push(a);
    });
    renderTudo();
  });

  DB.ref("extrusao_paradas").orderByChild("data").equalTo(dt).on("value",function(s){
    LINHAS.forEach(function(l){EST[l].paradas=[];});
    if(s.exists()) s.forEach(function(c){
      var p=c.val(); p.fbKey=c.key;
      if(p.turno===t && EST[p.linha]) EST[p.linha].paradas.push(p);
    });
    renderTudo();
  });

  LINHAS.forEach(function(linha){
    var key="extrusao_op_ativa/"+linha.replace(/[^a-zA-Z0-9]/g,"_")+"/"+dt+"/t"+t;
    DB.ref(key).on("value",function(s){
      EST[linha].opAtiva=s.exists()?s.val():null;
      renderLinha(linha);
    });
  });

  // Total do dia — todos os turnos
  DB.ref("extrusao_apts").orderByChild("data").equalTo(dt).on("value",function(s){
    TOT_DIA=0;
    if(s.exists()) s.forEach(function(c){
      var a=c.val();
      TOT_DIA+=(Number(a.real)||0);
    });
    atualizarTotais();
  });

  // Total do mês — turno atual
  var mesInicio=dt.slice(0,7)+"-01";
  var mesFim=dt.slice(0,7)+"-31";
  DB.ref("extrusao_apts").orderByChild("data").startAt(mesInicio).endAt(mesFim).on("value",function(s){
    TOT_MES=0;
    if(s.exists()) s.forEach(function(c){
      var a=c.val();
      if(a.turno===t) TOT_MES+=(Number(a.real)||0);
    });
    atualizarTotais();
  });
}

function atualizarTotais(){
  var el_dia=G("tot-dia"), el_mes=G("tot-mes"), el_lbl=G("tot-mes-lbl");
  if(el_dia) el_dia.textContent=fN(TOT_DIA)+" kg";
  if(el_mes) el_mes.textContent=fN(TOT_MES)+" kg";
  if(el_lbl) el_lbl.textContent="TOTAL DO MÊS — TURNO "+turnoAtual();
}

function iniciarRelogio(){
  var meses=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  setInterval(function(){
    var d=new Date();
    G("top-hora").textContent=pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());
    G("top-data").textContent=pad(d.getDate())+" "+meses[d.getMonth()]+" "+d.getFullYear();
    G("top-turno").textContent="TURNO "+turnoAtual();
    // Atualiza duração das paradas ativas
    LINHAS.forEach(function(l){
      var e=EST[l];
      var pa=e.paradas.find(function(p){return !p.horaFim;});
      if(pa) renderLinha(l);
    });
  },1000);
}

iniciar();
</script>
